<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopan - Artist Roster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #14171C;
            --accent-green: #23C55E;
            --text-main: #FFFFFF;
            --text-muted: #636E7A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(180deg, #1A1E26 0%, var(--bg-main) 300px);
            min-height: 100vh;
            padding-bottom: 40px;
            position: relative;
        }

        /* HEADER DENGAN ANIMASI PENCARIAN */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            background-color: rgba(20, 23, 28, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            height: 70px;
            overflow: hidden;
        }

        .home-btn, .search-toggle {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .home-btn:active, .search-toggle:active { transform: scale(0.9); }

        .brand-wrapper {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand { font-weight: 800; font-size: 18px; letter-spacing: 1px; }

        /* SEARCH BAR ANIMASI */
        .search-container {
            position: absolute;
            left: 20px;
            right: 60px;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            z-index: 5;
        }

        .search-container input {
            width: 100%;
            background: #090A0C;
            border: 1px solid var(--accent-green);
            padding: 10px 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        header.searching .home-btn { transform: translateX(-100px); opacity: 0; }
        header.searching .brand-wrapper { opacity: 0; transform: translate(-50%, 20px); pointer-events: none; }
        header.searching .search-container { opacity: 1; transform: translateX(0); }

        /* SECTION INFO UPDATED */
        .section-info { 
            padding: 30px 20px 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
        }
        .info-left h1, .info-right h1 { font-size: 32px; font-weight: 800; }
        .info-left p, .info-right p { color: var(--text-muted); font-size: 14px; font-weight: 600; }
        .info-right { text-align: right; }
        .info-right h1 { color: var(--accent-green); }

        /* GRID ARTIS DIPERKECIL */
        .artist-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px 15px;
            padding: 20px;
        }

        .artist-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeInUp 0.6s ease backwards;
        }

        .artist-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .artist-card:hover .artist-avatar {
            border-color: var(--accent-green);
            transform: scale(1.05);
        }

        .artist-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-main);
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: color 0.3s;
        }

        .artist-name:hover {
            color: var(--accent-green);
        }

        #loading { text-align: center; padding: 50px; color: var(--text-muted); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header id="mainHeader">
            <div class="home-btn" onclick="location.href='index.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </div>

            <div class="brand-wrapper">
                <div class="logo-box" style="width: 28px; height: 28px;">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <rect width="100" height="100" rx="25" fill="#FFFFFF"/>
                        <path d="M68,32 C60,24 40,24 32,32 C24,40 32,50 50,50 C68,50 76,60 68,68 C60,76 40,76 32,68" stroke="#14171C" stroke-width="12" stroke-linecap="round" fill="none"/>
                    </svg>
                </div>
                <span class="brand">Sopan</span>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Cari nama artis..." onkeyup="filterArtists()">
            </div>

            <div class="search-toggle" onclick="toggleSearch()">
                <svg id="searchIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </header>

        <div class="section-info">
            <div class="info-left">
                <h1>Artists</h1>
                <p>Sopan Team's roster.</p>
            </div>
            <div class="info-right">
                <h1 id="totalArtists">0+</h1>
                <p>Artist</p>
            </div>
        </div>

        <div id="loading">Memuat daftar artis...</div>
        <div class="artist-grid" id="artistList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQJ0dFT8ohAkwDODrdfDa2GEwzk0kZRm0",
            authDomain: "labelmusic-ee1b2.firebaseapp.com",
            databaseURL: "https://labelmusic-ee1b2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "labelmusic-ee1b2",
            storageBucket: "labelmusic-ee1b2.firebasestorage.app",
            messagingSenderId: "634541524714",
            appId: "1:634541524714:web:a2fc9d47a91e37f44a7993"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const usersRef = ref(db, 'users');

        onValue(usersRef, (snapshot) => {
            const listContainer = document.getElementById('artistList');
            const loading = document.getElementById('loading');
            const countDisplay = document.getElementById('totalArtists');
            listContainer.innerHTML = '';
            
            if (snapshot.exists()) {
                loading.style.display = 'none';
                const data = snapshot.val();
                let index = 0;
                let count = 0;

                Object.keys(data).forEach(key => {
                    const artist = data[key];
                    if (artist.username && artist.profilePic) {
                        count++;
                        
                        // LOGIKA AUTO-SLUG: Bikin link otomatis dari nama (p=nama-artis)
                        const autoSlug = artist.username.toLowerCase()
                            .replace(/[^\w ]+/g, '') // Hapus simbol
                            .replace(/ +/g, '-');    // Ubah spasi jadi strip
                        
                        const cardHTML = `
                            <div class="artist-card" style="animation-delay: ${index * 0.1}s">
                                <img src="${artist.profilePic}" class="artist-avatar" alt="${artist.username}">
                                <div class="artist-name" onclick="window.location.href='artist.html?p=${autoSlug}'">${artist.username}</div>
                            </div>
                        `;
                        listContainer.insertAdjacentHTML('beforeend', cardHTML);
                        index++;
                    }
                });
                countDisplay.innerText = `${count}+`;
            } else {
                loading.innerText = "Belum ada artis terdaftar.";
                countDisplay.innerText = "0+";
            }
        });

        window.toggleSearch = () => {
            const header = document.getElementById('mainHeader');
            const input = document.getElementById('searchInput');
            header.classList.toggle('searching');
            if(header.classList.contains('searching')) {
                input.focus();
            } else {
                input.value = '';
                filterArtists();
            }
        };

        window.filterArtists = () => {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.artist-card');
            cards.forEach(card => {
                const name = card.querySelector('.artist-name').innerText.toLowerCase();
                card.style.display = name.includes(query) ? 'flex' : 'none';
            });
        };
    </script>
</body>
</html>
