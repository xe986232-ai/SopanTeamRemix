<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WNFX - Free Acapella Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #14171C; color: #FFFFFF; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* HEADER */
        header { 
            width: 100%; 
            max-width: 500px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            position: sticky; 
            top: 0; 
            background: rgba(20, 23, 28, 0.9); 
            backdrop-filter: blur(15px);
            z-index: 1000; 
            height: 70px;
        }
        
        .brand-wrapper { 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .logo-box { width: 30px; height: 30px; }
        .logo-text { font-weight: 800; font-size: 18px; letter-spacing: 1px; color: #FFFFFF; }
        
        .back-btn { 
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; transition: 0.3s;
        }

        /* SEARCH POJOK KANAN ATAS */
        .search-trigger {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; transition: 0.3s;
        }

        .search-container-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #14171C;
            display: none;
            align-items: center;
            padding: 0 20px;
            z-index: 1001;
        }

        .search-box-inner {
            width: 100%;
            background: #090A0C;
            border-radius: 12px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(35, 197, 94, 0.3);
        }

        .search-box-inner input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            font-size: 14px;
            outline: none;
        }

        /* HERO */
        .hero { width: 100%; max-width: 500px; padding: 30px 20px 25px; text-align: center; }
        .hero h1 { font-size: 28px; font-weight: 800; color: #FFFFFF; }
        .hero p { font-size: 13px; color: #636E7A; margin-top: 5px; }
        .hero-line { width: 40px; height: 4px; background: #23C55E; margin: 15px auto; border-radius: 10px; }

        /* PLAYLIST */
        .container { width: 100%; max-width: 500px; padding: 0 20px 40px; display: flex; flex-direction: column; align-items: center; }
        
        .playlist-item { 
            width: 100%;
            background: #090A0C; 
            border-radius: 20px; 
            padding: 18px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.3s;
        }

        .play-btn { 
            width: 45px; height: 45px; 
            background: #23C55E; 
            border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; flex-shrink: 0; transition: 0.3s; 
        }
        .play-btn i { font-size: 18px; color: #14171C; }

        .track-info { flex: 1; min-width: 0; }
        .track-title { font-size: 14px; font-weight: 700; color: #FFFFFF; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .uploader-name { font-size: 11px; color: #23C55E; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .progress-wrap { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #23C55E; transition: width 0.1s linear; }

        .dl-btn { 
            width: 38px; height: 38px; 
            background: rgba(35, 197, 94, 0.1); 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            color: #23C55E; text-decoration: none; border: 1px solid rgba(35, 197, 94, 0.2);
            transition: 0.3s;
        }
        .dl-btn:active { transform: scale(0.9); background: #23C55E; color: #14171C; }

        .viz-box { display: flex; gap: 3px; height: 12px; align-items: flex-end; margin-bottom: 5px; opacity: 0; transition: 0.3s; }
        .playing .viz-box { opacity: 1; }
        .bar { width: 2px; height: 4px; background: #23C55E; border-radius: 1px; }
        .playing .bar { animation: bounce 0.6s infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }

        @keyframes bounce { from { height: 3px; } to { height: 12px; } }
    </style>
</head>
<body>

<header>
    <div class="back-btn" onclick="window.location.href='index.html'">
        <i class="fas fa-chevron-left"></i>
    </div>
    
    <div class="brand-wrapper">
        <div class="logo-box">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="25" fill="#FFFFFF"/>
                <path d="M68,32 C60,24 40,24 32,32 C24,40 32,50 50,50 C68,50 76,60 68,68 C60,76 40,76 32,68" stroke="#14171C" stroke-width="12" stroke-linecap="round" fill="none"/>
            </svg>
        </div>
        <div class="logo-text">Sopan</div>
    </div>

    <div class="search-trigger" onclick="toggleSearch(true)">
        <i class="fas fa-search"></i>
    </div>

    <div class="search-container-overlay" id="searchOverlay">
        <div class="search-box-inner">
            <i class="fas fa-search" style="color: #23C55E;"></i>
            <input type="text" id="searchInput" placeholder="Cari acapella...">
            <i class="fas fa-times" onclick="toggleSearch(false)" style="cursor: pointer; color: #636E7A;"></i>
        </div>
    </div>
</header>

<section class="hero">
    <h1>Acapella Collection</h1>
    <p>Vocal stems berkualitas untuk produksi musikmu.</p>
    <div class="hero-line"></div>
</section>

<main class="container">
    <div id="playlist" style="width: 100%;">
        <p id="loadingTxt" style="text-align: center; color: #636E7A; font-size: 13px;">Memuat data acapella...</p>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDQJ0dFT8ohAkwDODrdfDa2GEwzk0kZRm0",
        authDomain: "labelmusic-ee1b2.firebaseapp.com",
        projectId: "labelmusic-ee1b2",
        storageBucket: "labelmusic-ee1b2.firebasestorage.app",
        messagingSenderId: "634541524714",
        appId: "1:634541524714:web:a2fc9d47a91e37f44a7993"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const playlistContainer = document.getElementById('playlist');
    let currentAudio = null;
    let currentActiveItem = null;
    let allAcapellas = [];

    // FUNGSI SEARCH OVERLAY
    window.toggleSearch = (show) => {
        const overlay = document.getElementById('searchOverlay');
        overlay.style.display = show ? 'flex' : 'none';
        if(show) document.getElementById('searchInput').focus();
    };

    // LOAD DATA DARI FIRESTORE
    const q = query(collection(db, "acapellas"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        allAcapellas = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderAcapella(allAcapellas);
    });

    // FUNGSI DOWNLOAD LANGSUNG
    window.downloadAudio = async (url, filename) => {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = filename + ".mp3";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } catch (error) {
            window.open(url, '_blank'); // Fallback jika fetch gagal
        }
    };

    function renderAcapella(data) {
        playlistContainer.innerHTML = '';
        if(data.length === 0) {
            playlistContainer.innerHTML = '<p style="text-align:center; color:#636E7A;">Belum ada acapella.</p>';
            return;
        }

        data.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'playlist-item';
            div.innerHTML = `
                <audio id="audio-${index}" src="${item.audio}"></audio>
                <div class="play-btn" onclick="togglePlay(${index})">
                    <i class="fa-solid fa-play"></i>
                </div>
                <div class="track-info">
                    <div class="viz-box">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                    <span class="track-title">${item.judul}</span>
                    <div class="uploader-name">Uploaded by ${item.uploader || item.artis || 'Sopan'}</div>
                    <div class="progress-wrap">
                        <div class="progress-fill" id="progress-${index}"></div>
                    </div>
                </div>
                <div class="dl-btn" onclick="downloadAudio('${item.audio}', '${item.judul}')">
                    <i class="fas fa-download"></i>
                </div>
            `;
            playlistContainer.appendChild(div);
        });
    }

    // SEARCH LOGIC
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = allAcapellas.filter(a => 
            a.judul.toLowerCase().includes(val) || 
            (a.uploader && a.uploader.toLowerCase().includes(val))
        );
        renderAcapella(filtered);
    });

    // GLOBAL TOGGLE PLAY
    window.togglePlay = (index) => {
        const audio = document.getElementById(`audio-${index}`);
        const item = audio.parentElement;
        const btnIcon = item.querySelector('.play-btn i');
        const progressFill = document.getElementById(`progress-${index}`);

        if (currentAudio && currentAudio !== audio) {
            currentAudio.pause();
            currentActiveItem.classList.remove('playing');
            currentActiveItem.querySelector('.play-btn i').className = 'fa-solid fa-play';
        }

        if (audio.paused) {
            audio.play();
            item.classList.add('playing');
            btnIcon.className = 'fa-solid fa-pause';
            currentAudio = audio;
            currentActiveItem = item;

            audio.ontimeupdate = () => {
                const prog = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = prog + '%';
            };
        } else {
            audio.pause();
            item.classList.remove('playing');
            btnIcon.className = 'fa-solid fa-play';
        }
    };
</script>

</body>
</html>
