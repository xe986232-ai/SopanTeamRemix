<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Team Sopan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #14171C; color: #FFFFFF; min-height: 100vh; padding: 20px; }

        header {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-title h1 { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
        .admin-title p { font-size: 12px; color: #636E7A; }

        .container { width: 100%; max-width: 600px; margin: 0 auto; }

        /* Group Styling */
        .user-group { margin-bottom: 40px; }
        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .group-header i { color: #23C55E; }
        .group-header h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #636E7A; }
        .count-badge { background: #23C55E; color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; }

        /* User Card Wrapper */
        .user-wrapper {
            background: #090A0C;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            overflow: hidden;
            transition: 0.3s;
        }

        .user-card {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .user-card:hover { background: rgba(255,255,255,0.02); }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-info { flex: 1; }
        .user-info h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .user-info p { font-size: 11px; color: #636E7A; }

        /* Detail Selection Content */
        .detail-content {
            display: none;
            padding: 0 15px 15px 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: #0d0f13;
            animation: slideDown 0.3s ease;
        }
        .user-wrapper.active .detail-content { display: block; }
        .user-wrapper.active { border-color: #23C55E; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-grid { display: grid; gap: 15px; margin-top: 15px; }
        .detail-item { font-size: 12px; }
        .detail-item label { color: #636E7A; display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: 800; font-size: 10px; }
        
        .media-player { width: 100%; border-radius: 8px; background: #14171C; margin-top: 5px; }
        video.media-player { aspect-ratio: 16/9; }

        .btn-approve {
            width: 100%;
            background: #23C55E;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-approve:hover { filter: brightness(1.2); }

        .status-badge { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: 700; }
        .status-success { background: rgba(35, 197, 94, 0.1); color: #23C55E; }
        
        .loading-state { text-align: center; padding: 40px; color: #636E7A; }
    </style>
</head>
<body>

<header>
    <div class="admin-title">
        <h1>Admin Panel</h1>
        <p>Manajemen Member Team Sopan</p>
    </div>
    <a href="index.html" style="color: #636E7A; text-decoration: none; font-size: 20px;"><i class="fa-solid fa-house"></i></a>
</header>

<div class="container">
    <section class="user-group" id="groupPending">
        <div class="group-header">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <h2>Menunggu Persetujuan</h2>
            <span class="count-badge" id="countPending">0</span>
        </div>
        <div id="listPending">
            <div class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i> Memuat data...</div>
        </div>
    </section>

    <section class="user-group" id="groupSuccess">
        <div class="group-header">
            <i class="fa-solid fa-circle-check"></i>
            <h2>Member Aktif</h2>
            <span class="count-badge" id="countSuccess" style="background: #636E7A;">0</span>
        </div>
        <div id="listSuccess"></div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDQJ0dFT8ohAkwDODrdfDa2GEwzk0kZRm0",
        authDomain: "labelmusic-ee1b2.firebaseapp.com",
        databaseURL: "https://labelmusic-ee1b2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "labelmusic-ee1b2",
        storageBucket: "labelmusic-ee1b2.firebasestorage.app",
        messagingSenderId: "634541524714",
        appId: "1:634541524714:web:a2fc9d47a91e37f44a7993"
    };

    const app = initializeApp(firebaseConfig);
    const rtdb = getDatabase(app);

    // Fungsi Global Toggle Detail
    window.toggleDetail = (element) => {
        element.closest('.user-wrapper').classList.toggle('active');
    };

    // Fungsi Update Status
    window.approveUser = async (uid, event) => {
        event.stopPropagation(); // Biar detail gak ketutup pas klik tombol
        const userRef = ref(rtdb, 'users/' + uid);
        try {
            if(confirm("Terima artist ini sebagai member aktif?")) {
                await update(userRef, { status: 'success' });
            }
        } catch (error) {
            alert("Gagal mengupdate status");
        }
    };

    const usersRef = ref(rtdb, 'users');
    onValue(usersRef, (snapshot) => {
        const listPending = document.getElementById('listPending');
        const listSuccess = document.getElementById('listSuccess');
        const countPending = document.getElementById('countPending');
        const countSuccess = document.getElementById('countSuccess');

        listPending.innerHTML = '';
        listSuccess.innerHTML = '';

        let pendingCount = 0;
        let successCount = 0;

        if (snapshot.exists()) {
            const data = snapshot.val();
            
            Object.keys(data).forEach(uid => {
                const user = data[uid];
                const wrapper = document.createElement('div');
                wrapper.className = 'user-wrapper';
                
                const htmlContent = `
                    <div class="user-card" onclick="toggleDetail(this)">
                        <img src="${user.profilePic || 'https://via.placeholder.com/150'}" class="user-avatar">
                        <div class="user-info">
                            <h4>${user.username || 'Anonymous'}</h4>
                            <p>${user.email || 'No Email'}</p>
                        </div>
                        ${user.status === 'success' ? '<span class="status-badge status-success">ACTIVE</span>' : '<i class="fa-solid fa-chevron-down" style="color:#636E7A; font-size:12px;"></i>'}
                    </div>
                    
                    <div class="detail-content">
                        <div class="detail-grid">
                            <div class="detail-item">
                                <label>Email Aktif (Konfirmasi)</label>
                                <p style="font-size:13px;">${user.emailAktif || '-'}</p>
                            </div>
                            <div class="detail-item">
                                <label>Link YouTube</label>
                                <a href="${user.youtube}" target="_blank" style="color:#23C55E; font-size:11px; text-decoration:none;">${user.youtube || 'Tidak ada link'}</a>
                            </div>
                            
                            ${user.demoAudio ? `
                                <div class="detail-item">
                                    <label>Demo Audio</label>
                                    <audio controls class="media-player">
                                        <source src="${user.demoAudio}" type="audio/mpeg">
                                    </audio>
                                </div>
                            ` : ''}

                            ${user.demoVideo ? `
                                <div class="detail-item">
                                    <label>Demo Video / Record FLM</label>
                                    <video controls class="media-player">
                                        <source src="${user.demoVideo}" type="video/mp4">
                                    </video>
                                </div>
                            ` : ''}
                        </div>

                        ${user.status === 'pending' ? `
                            <button class="btn-approve" onclick="approveUser('${uid}', event)">
                                <i class="fa-solid fa-check-circle"></i> TERIMA SEBAGAI ARTIST
                            </button>
                        ` : ''}
                    </div>
                `;
                
                wrapper.innerHTML = htmlContent;

                if (user.status === 'success') {
                    listSuccess.appendChild(wrapper);
                    successCount++;
                } else {
                    listPending.appendChild(wrapper);
                    pendingCount++;
                }
            });
        }

        countPending.innerText = pendingCount;
        countSuccess.innerText = successCount;

        if (pendingCount === 0) listPending.innerHTML = '<p style="font-size:12px; color:#636E7A; text-align:center;">Tidak ada permintaan pending.</p>';
        if (successCount === 0) listSuccess.innerHTML = '<p style="font-size:12px; color:#636E7A; text-align:center;">Belum ada member aktif.</p>';
    });
</script>

</body>
</html>
