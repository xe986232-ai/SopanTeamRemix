<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Join Artist - Sopan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: #14171C; color: #FFFFFF; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(180deg, #14171C 0%, #090A0C 100%); padding: 20px;
        }
        .login-container { width: 100%; max-width: 450px; text-align: center; animation: fadeIn 0.8s ease; }

        /* STEP INDICATOR */
        .step-wizard {
            display: none; justify-content: space-between; align-items: center;
            margin-bottom: 25px; position: relative; padding: 0 30px;
        }
        .step-wizard::before {
            content: ''; position: absolute; top: 20px; left: 60px; right: 60px;
            height: 2px; background: rgba(255,255,255,0.1); z-index: 1;
        }
        .step-item { z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 60px; }
        .step-circle {
            width: 40px; height: 40px; border-radius: 50%; background: #14171C;
            border: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center;
            justify-content: center; font-weight: 800; color: #636E7A; transition: 0.3s;
        }
        .step-item.active .step-circle { background: #23C55E; border-color: #23C55E; color: white; box-shadow: 0 0 15px rgba(35, 197, 94, 0.4); }
        .step-label { font-size: 10px; font-weight: 700; color: #636E7A; text-transform: uppercase; white-space: nowrap; }
        .step-item.active .step-label { color: #23C55E; }

        .logo-section { margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .logo-box { width: 50px; height: 50px; }
        .logo-text { font-weight: 800; font-size: 24px; letter-spacing: 2px; }

        .form-box {
            background: #090A0C; padding: 30px; border-radius: 24px;
            border: 1px solid rgba(35, 197, 94, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h2 { font-size: 20px; margin-bottom: 25px; font-weight: 700; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 11px; color: #636E7A; margin-bottom: 5px; margin-left: 5px; text-transform: uppercase; font-weight: 700; }
        .input-group input {
            width: 100%; background: #14171C; border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 15px; border-radius: 12px; color: white; outline: none; transition: all 0.3s;
        }
        .input-group input:focus { border-color: #23C55E; background: #0c0d0f; }

        /* PROGRESS BAR */
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 20px; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #23C55E; transition: 0.3s; }

        /* REVIEW CARD */
        .preview-card { background: #14171C; border-radius: 15px; padding: 15px; text-align: left; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .preview-item { font-size: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .preview-item b { color: #23C55E; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-primary { flex: 2; background: #23C55E; color: white; padding: 14px; border: none; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-secondary { flex: 1; background: transparent; border: 1px solid #636E7A; color: #636E7A; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-primary:disabled { background: #1a5a31; opacity: 0.7; }

        .toggle-text { margin-top: 20px; font-size: 13px; color: #636E7A; }
        .toggle-text span { color: #23C55E; cursor: pointer; font-weight: 600; }

        .form-step { display: none; }
        .form-step.active { display: block; animation: fadeIn 0.4s ease; }

        .custom-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: #1a1d23; border: 2px solid #23C55E; padding: 25px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); transition: 0.4s; z-index: 9999;
            min-width: 320px; opacity: 0; pointer-events: none; text-align: center;
        }
        .custom-alert.show { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }

        /* MODAL OPMEM TUTUP - SIMPLE VERSION */
        .modal-opmem {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px;
        }
        .modal-content {
            background: #090A0C; padding: 30px; border-radius: 20px;
            max-width: 350px; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content p { color: #636E7A; font-size: 14px; margin: 15px 0; }
        .social-link { 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            text-decoration: none; color: rgba(255,255,255,0.3); font-size: 12px; margin-bottom: 20px;
        }
        .btn-ready { background: #23C55E; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="customAlert" class="custom-alert">
    <i class="fa-solid fa-circle-check" style="color: #23C55E; font-size: 40px;"></i>
    <span id="alertMsg">Pesan</span>
</div>

<div id="modalClosed" class="modal-opmem">
    <div class="modal-content">
        <div class="logo-box" style="margin: 0 auto 10px; width: 40px; height: 40px;">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="25" fill="#FFFFFF"/>
                <path d="M68,32 C60,24 40,24 32,32 C24,40 32,50 50,50 C68,50 76,60 68,68 C60,76 40,76 32,68" stroke="#14171C" stroke-width="12" stroke-linecap="round" fill="none"/>
            </svg>
        </div>
        <h3 style="font-size: 16px; letter-spacing: 1px;">NO OPMEM</h3>
        <p>Pantau terus media sosial kami</p>
        <a href="https://www.tiktok.com/@team.sopan.remix?_r=1&_t=ZS-94aRYmMDgpQ" class="social-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.23-2.81.31-.75.42-1.24 1.25-1.33 2.1-.1.7.1 1.41.53 1.98.5.63 1.34 1.01 2.14 1.01.7 0 1.4-.23 1.9-.74.61-.54.96-1.34 1.03-2.15.08-2.32.04-4.64.04-6.96.01-3.41.01-6.82.01-10.24z"/></svg>
            <span>Tiktok</span>
        </a>
        <button class="btn-ready" onclick="window.location.href='index.html'">OKE, SIAP</button>
    </div>
</div>

<div class="login-container">
    <div class="logo-section">
        <div class="logo-box">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="25" fill="#FFFFFF"/>
                <path d="M68,32 C60,24 40,24 32,32 C24,40 32,50 50,50 C68,50 76,60 68,68 C60,76 40,76 32,68" stroke="#14171C" stroke-width="12" stroke-linecap="round" fill="none"/>
            </svg>
        </div>
        <div class="logo-text">Sopan</div>
    </div>

    <div class="step-wizard" id="stepWizard">
        <div class="step-item active" id="si1"><div class="step-circle">1</div><div class="step-label">Artist</div></div>
        <div class="step-item" id="si2"><div class="step-circle">2</div><div class="step-label">Media</div></div>
        <div class="step-item" id="si3"><div class="step-circle">3</div><div class="step-label">Review</div></div>
    </div>

    <div class="form-box">
        <h2 id="formTitle">Selamat Datang</h2>
        
        <div id="loginSection" class="form-step active">
            <div class="input-group"><label>Email</label><input type="email" id="email" placeholder="nama@teamsopan.com"></div>
            <div class="input-group"><label>Password</label><input type="password" id="password" placeholder="••••••••"></div>
        </div>

        <div id="step1" class="form-step">
            <div class="input-group"><label>Foto Profil (1:1)</label><input type="file" id="regAvatar" accept="image/*"></div>
            <div class="input-group"><label>Nama Artist</label><input type="text" id="regName" placeholder="Contoh: Budi"></div>
            <div class="input-group"><label>Link YouTube</label><input type="url" id="regYt" placeholder="http://youtube.com/..."></div>
        </div>

        <div id="step2" class="form-step">
            <div class="input-group"><label>Email Aktif</label><input type="email" id="regEmailAktif" placeholder="Email konfirmasi"></div>
            <div class="input-group"><label>Demo Audio (MP3/WAV)</label><input type="file" id="regAudio" accept="audio/*"></div>
            <div class="input-group"><label>Record FLM/Video (MP4)</label><input type="file" id="regVideo" accept="video/*"></div>
        </div>

        <div id="step3" class="form-step">
            <div class="preview-card" id="previewData"></div>
            <p style="font-size: 11px; color: #636E7A;">*Pastikan data benar. Admin akan meninjau pendaftaran Anda.</p>
        </div>

        <div class="progress-container" id="progCont"><div class="progress-bar" id="progBar"></div></div>

        <div class="btn-group">
            <button class="btn-secondary" id="backBtn" style="display:none;" onclick="moveStep(-1)">Kembali</button>
            <button class="btn-primary" id="mainBtn" onclick="handleAuth()">Masuk</button>
        </div>

        <p class="toggle-text" id="toggleText">
            Mau join team sopan? <span onclick="checkOpmemStatus()">Daftar</span>
        </p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDQJ0dFT8ohAkwDODrdfDa2GEwzk0kZRm0",
        authDomain: "labelmusic-ee1b2.firebaseapp.com",
        databaseURL: "https://labelmusic-ee1b2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "labelmusic-ee1b2",
        storageBucket: "labelmusic-ee1b2.firebasestorage.app",
        messagingSenderId: "634541524714",
        appId: "1:634541524714:web:a2fc9d47a91e37f44a7993"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let isLoginMode = true;
    let currentStep = 1;

    function showSopanAlert(msg) {
        const box = document.getElementById('customAlert');
        document.getElementById('alertMsg').innerText = msg;
        box.classList.add('show');
        setTimeout(() => box.classList.remove('show'), 4000);
    }

    // LOGIKA CEK STATUS OPMEM
    window.checkOpmemStatus = async () => {
        try {
            const dbRef = ref(getDatabase());
            const snapshot = await get(child(dbRef, `opmem/status`));
            if (snapshot.exists() && snapshot.val() === "tutup") {
                document.getElementById('modalClosed').style.display = 'flex';
            } else {
                toggleMode();
            }
        } catch (error) {
            toggleMode();
        }
    };

    function generateRandomPass() {
        return Math.random().toString(36).slice(-8);
    }

    window.toggleMode = () => {
        isLoginMode = !isLoginMode;
        currentStep = 1;
        document.getElementById('stepWizard').style.display = isLoginMode ? 'none' : 'flex';
        document.getElementById('loginSection').style.display = isLoginMode ? 'block' : 'none';
        document.getElementById('step1').classList.toggle('active', !isLoginMode);
        document.getElementById('formTitle').innerText = isLoginMode ? 'Selamat Datang' : 'Pendaftaran Artist';
        document.getElementById('mainBtn').innerText = isLoginMode ? 'Masuk' : 'Berikutnya';
        document.getElementById('toggleText').innerHTML = isLoginMode ? 
            'Mau join team sopan? <span onclick="checkOpmemStatus()">Daftar</span>' : 
            'Sudah punya akun? <span onclick="toggleMode()">Masuk</span>';
        document.getElementById('backBtn').style.display = 'none';
        if(!isLoginMode) resetStepIcons();
    };

    function resetStepIcons() {
        document.querySelectorAll('.step-item').forEach((item, idx) => {
            item.classList.toggle('active', idx === 0);
        });
    }

    window.moveStep = (n) => {
        if (n === 1) {
            if (currentStep === 1) {
                const name = document.getElementById('regName').value;
                if(!name || !document.getElementById('regAvatar').files[0]) return showSopanAlert("Nama & Foto wajib!");
                if(!name.toLowerCase().endsWith("sopan")) {
                    document.getElementById('regName').value = name.trim() + " SOPAN";
                }
            }
            if (currentStep === 2) {
                if(!document.getElementById('regEmailAktif').value || !document.getElementById('regAudio').files[0]) return showSopanAlert("Email & Audio wajib!");
                renderReview();
            }
        }

        currentStep += n;
        document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
        document.getElementById(isLoginMode ? 'loginSection' : `step${currentStep}`).classList.add('active');
        
        document.querySelectorAll('.step-item').forEach((item, idx) => {
            item.classList.toggle('active', idx + 1 <= currentStep);
        });

        document.getElementById('mainBtn').innerText = currentStep === 3 ? 'SUBMIT DAFTAR' : 'Berikutnya';
        document.getElementById('backBtn').style.display = currentStep > 1 ? 'block' : 'none';
    };

    function renderReview() {
        const name = document.getElementById('regName').value;
        const genEmail = name.toLowerCase().replace(/\s+/g, '') + "@teamsopan.com";
        const genPass = generateRandomPass();
        
        document.getElementById('previewData').innerHTML = `
            <div class="preview-item"><span>Artist:</span><b>${name}</b></div>
            <div class="preview-item"><span>Email Aktif:</span><b>${document.getElementById('regEmailAktif').value}</b></div>
            <div class="preview-item"><span>Draft Akun:</span><b>${genEmail}</b></div>
        `;
        document.getElementById('previewData').dataset.genEmail = genEmail;
        document.getElementById('previewData').dataset.genPass = genPass;
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'admin_super');
        const res = await fetch(`https://api.cloudinary.com/v1_1/dt2u1r8ni/auto/upload`, { method: 'POST', body: formData });
        const data = await res.json();
        return data.secure_url;
    }

    window.handleAuth = async () => {
        const btn = document.getElementById('mainBtn');
        if (isLoginMode) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return showSopanAlert("Isi email & password!");
            try {
                btn.disabled = true; btn.innerText = "Loading...";
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html";
            } catch (e) { showSopanAlert("Gagal masuk!"); btn.disabled = false; btn.innerText = "Masuk"; }
        } else {
            if (currentStep < 3) return moveStep(1);
            
            btn.disabled = true; btn.innerText = "Uploading Files...";
            document.getElementById('progCont').style.display = 'block';
            document.getElementById('progBar').style.width = '30%';

            try {
                const photoUrl = await uploadFile(document.getElementById('regAvatar').files[0]);
                document.getElementById('progBar').style.width = '60%';
                
                const audioUrl = await uploadFile(document.getElementById('regAudio').files[0]);
                const videoFile = document.getElementById('regVideo').files[0];
                const videoUrl = videoFile ? await uploadFile(videoFile) : "";
                
                document.getElementById('progBar').style.width = '90%';
                
                const genEmail = document.getElementById('previewData').dataset.genEmail;
                const genPass = document.getElementById('previewData').dataset.genPass;

                const userCred = await createUserWithEmailAndPassword(auth, genEmail, genPass);
                
                await set(ref(db, 'users/' + userCred.user.uid), {
                    username: document.getElementById('regName').value,
                    email: genEmail,
                    passwordPlain: genPass,
                    emailAktif: document.getElementById('regEmailAktif').value,
                    profilePic: photoUrl,
                    demoAudio: audioUrl,
                    demoVideo: videoUrl,
                    youtube: document.getElementById('regYt').value,
                    role: "member",
                    status: "pending",
                    createdAt: new Date().toISOString()
                });

                document.getElementById('progBar').style.width = '100%';
                showSopanAlert("Pendaftaran Berhasil! Akun sedang ditinjau. Informasi akan dikirim ke email aktif Anda.");
                setTimeout(() => location.reload(), 5000);

            } catch (err) {
                showSopanAlert("Error: " + err.message);
                btn.disabled = false; btn.innerText = "DAFTAR";
            }
        }
    };
</script>

</body>
</html>
